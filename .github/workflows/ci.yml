name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: node --max-old-space-size=4096 node_modules/typescript/bin/tsc --noEmit
        continue-on-error: true  # pre-existing errors in patents.ts — remove once clean

      - name: Unit tests
        run: npm test
