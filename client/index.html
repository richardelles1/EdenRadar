<!DOCTYPE html>

    <meta charset="UTF-8" />

    <title>EdenRadar — Biotech Asset Discovery</title>
    <meta name="description" content="AI-powered biotech asset matchmaking platform. Discover, score, and connect with biotech assets across scientific literature and university tech transfer offices with EdenRadar." />
    <script>
      (function() {
        var stored = localStorage.getItem("eden-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored || (prefersDark ? "dark" : "light");
        if (theme === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap">
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap">
