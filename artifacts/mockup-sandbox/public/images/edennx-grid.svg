<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice">
  <!-- Pale-emerald randomised checker pattern that mirrors the edennx.com hero
       background. 12x12 grid; each cell is 100x100; fill alpha varies across
       the grid for a quiet, organic rhythm. Pure SVG, no JS, scales to any
       viewport via the host element's width/height. -->
  <defs>
    <pattern id="cell-stroke" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none" stroke="#10603b" stroke-width="0.6" stroke-opacity="0.10"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <!-- Subtle grid lines across the whole canvas -->
  <rect width="100%" height="100%" fill="url(#cell-stroke)"/>
  <!-- Sparse pale-emerald filled cells. Hand-placed so the rhythm doesn't repeat. -->
  <g fill="#10603b">
    <rect x="0"    y="0"    width="100" height="100" opacity="0.04"/>
    <rect x="200"  y="0"    width="100" height="100" opacity="0.07"/>
    <rect x="500"  y="0"    width="100" height="100" opacity="0.05"/>
    <rect x="800"  y="0"    width="100" height="100" opacity="0.03"/>
    <rect x="1100" y="0"    width="100" height="100" opacity="0.06"/>
    <rect x="100"  y="100"  width="100" height="100" opacity="0.05"/>
    <rect x="400"  y="100"  width="100" height="100" opacity="0.08"/>
    <rect x="700"  y="100"  width="100" height="100" opacity="0.04"/>
    <rect x="1000" y="100"  width="100" height="100" opacity="0.06"/>
    <rect x="0"    y="200"  width="100" height="100" opacity="0.03"/>
    <rect x="300"  y="200"  width="100" height="100" opacity="0.06"/>
    <rect x="600"  y="200"  width="100" height="100" opacity="0.04"/>
    <rect x="900"  y="200"  width="100" height="100" opacity="0.07"/>
    <rect x="1100" y="200"  width="100" height="100" opacity="0.04"/>
    <rect x="200"  y="300"  width="100" height="100" opacity="0.05"/>
    <rect x="500"  y="300"  width="100" height="100" opacity="0.08"/>
    <rect x="800"  y="300"  width="100" height="100" opacity="0.04"/>
    <rect x="1000" y="300"  width="100" height="100" opacity="0.05"/>
    <rect x="0"    y="400"  width="100" height="100" opacity="0.06"/>
    <rect x="100"  y="400"  width="100" height="100" opacity="0.03"/>
    <rect x="400"  y="400"  width="100" height="100" opacity="0.07"/>
    <rect x="700"  y="400"  width="100" height="100" opacity="0.05"/>
    <rect x="900"  y="400"  width="100" height="100" opacity="0.06"/>
    <rect x="1100" y="400"  width="100" height="100" opacity="0.03"/>
    <rect x="200"  y="500"  width="100" height="100" opacity="0.04"/>
    <rect x="500"  y="500"  width="100" height="100" opacity="0.06"/>
    <rect x="800"  y="500"  width="100" height="100" opacity="0.08"/>
    <rect x="1000" y="500"  width="100" height="100" opacity="0.04"/>
    <rect x="0"    y="600"  width="100" height="100" opacity="0.05"/>
    <rect x="300"  y="600"  width="100" height="100" opacity="0.07"/>
    <rect x="600"  y="600"  width="100" height="100" opacity="0.04"/>
    <rect x="900"  y="600"  width="100" height="100" opacity="0.06"/>
    <rect x="1100" y="600"  width="100" height="100" opacity="0.05"/>
    <rect x="100"  y="700"  width="100" height="100" opacity="0.04"/>
    <rect x="400"  y="700"  width="100" height="100" opacity="0.06"/>
    <rect x="700"  y="700"  width="100" height="100" opacity="0.03"/>
    <rect x="1000" y="700"  width="100" height="100" opacity="0.07"/>
    <rect x="0"    y="800"  width="100" height="100" opacity="0.06"/>
    <rect x="200"  y="800"  width="100" height="100" opacity="0.04"/>
    <rect x="500"  y="800"  width="100" height="100" opacity="0.05"/>
    <rect x="800"  y="800"  width="100" height="100" opacity="0.06"/>
    <rect x="1100" y="800"  width="100" height="100" opacity="0.04"/>
    <rect x="100"  y="900"  width="100" height="100" opacity="0.07"/>
    <rect x="400"  y="900"  width="100" height="100" opacity="0.04"/>
    <rect x="600"  y="900"  width="100" height="100" opacity="0.05"/>
    <rect x="900"  y="900"  width="100" height="100" opacity="0.06"/>
    <rect x="0"    y="1000" width="100" height="100" opacity="0.04"/>
    <rect x="300"  y="1000" width="100" height="100" opacity="0.06"/>
    <rect x="700"  y="1000" width="100" height="100" opacity="0.03"/>
    <rect x="1000" y="1000" width="100" height="100" opacity="0.05"/>
    <rect x="1100" y="1000" width="100" height="100" opacity="0.07"/>
    <rect x="200"  y="1100" width="100" height="100" opacity="0.05"/>
    <rect x="500"  y="1100" width="100" height="100" opacity="0.04"/>
    <rect x="800"  y="1100" width="100" height="100" opacity="0.06"/>
  </g>
</svg>
