<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenNX — Three portals, one ecosystem (product-suite reveal)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edennx.css">
  <style>
    /* Product-suite reveal as three unified pill cards. Each pill names one
       product, its dot accent matches the site's deep-emerald primary. */
    .content { padding-top: 16vh; gap: 2.4vh; }
    .headline { font-size: 7.6vmin; max-width: 84%; }
    @media (orientation: portrait) { .headline { font-size: 9vmin; } }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <img src="/images/edennx-logo-full.png" alt="EdenNX">
    </div>
    <div class="content">
      <div class="eyebrow">Three portals. One ecosystem.</div>
      <div class="headline">The <span class="green">EdenNX</span> suite is here.</div>
      <div class="suite">
        <div class="pill"><span class="dot"></span><span class="name">Eden<span class="nx">Radar</span></span><span class="what">Discovery feed</span></div>
        <div class="pill"><span class="dot"></span><span class="name">Eden<span class="nx">Scout</span></span><span class="what">Pre-clinical intelligence</span></div>
        <div class="pill"><span class="dot"></span><span class="name">Eden<span class="nx">Market</span></span><span class="what">Licensing marketplace</span></div>
      </div>
    </div>
    <div class="url">
      edennx.com
      <span class="sub">edenradar.com  ·  edenscout.com  ·  edenmarket.com</span>
    </div>
  </div>
</body>
</html>
