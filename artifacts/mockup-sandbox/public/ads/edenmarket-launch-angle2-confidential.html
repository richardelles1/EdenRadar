<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenMarket — Confidential by design (positioning, dealroom)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edenmarket.css">
  <style>
    .accent-bar {
      height: 0.9vh;
      width: 9vw;
      background: #005f46;
      border-radius: 0.4vh;
      margin-bottom: 1vh;
    }
    .content { padding-top: 18vh; gap: 2.4vh; }
    .headline { font-size: 8.4vmin; }
    @media (orientation: portrait) {
      .headline { font-size: 9.6vmin; }
      .accent-bar { width: 14vw; }
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-label="EdenMarket"><path d="M11 20A7 7 0 0 1 4 13c0-7 9-9 17-9 0 8-2 17-9 17a7 7 0 0 1-7-7"/><path d="M4 21c0-4 5-9 9-10"/></svg>
      <div class="wordmark"><span class="eden">Eden</span>Market</div>
    </div>
    <div class="content">
      <div class="eyebrow">Confidential by design</div>
      <div class="accent-bar"></div>
      <div class="headline">Where biotech <span class="green">deals</span> happen <span class="green">behind the curtain.</span></div>
      <div class="features">
        <div class="row"><span class="dot"></span><span class="label">Blind listings</span></div>
        <div class="row"><span class="dot"></span><span class="label">NDA-gated deal rooms</span></div>
        <div class="row"><span class="dot"></span><span class="label">Success-fee pricing</span></div>
      </div>
    </div>
    <div class="url">edenmarket.com</div>
  </div>
</body>
</html>
