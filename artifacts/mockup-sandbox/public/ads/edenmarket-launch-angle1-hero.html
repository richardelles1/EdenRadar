<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenMarket — Where biotech deals happen (positioning, hero)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edenmarket.css">
  <style>
    /* Hero treatment: massive EdenMarket display wordmark, mirrors the
       EdenNX angle-1 hero so the suite feels of-a-piece. */
    .hero-headline {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 13.2vmin;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #0f172a;
    }
    .hero-headline .eden { color: #005f46; }
    .content { padding-top: 16vh; gap: 4vh; }
    @media (orientation: portrait) { .hero-headline { font-size: 15vmin; } }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-label="EdenMarket"><path d="M11 20A7 7 0 0 1 4 13c0-7 9-9 17-9 0 8-2 17-9 17a7 7 0 0 1-7-7"/><path d="M4 21c0-4 5-9 9-10"/></svg>
      <div class="wordmark"><span class="eden">Eden</span>Market</div>
    </div>
    <div class="content">
      <div class="eyebrow">The biotech deal marketplace</div>
      <div class="hero-headline"><span class="eden">Eden</span>Market</div>
      <div class="subline">Confidential biopharma deal flow. Browse, compare, and close on TTO spin-outs and deprioritized programs in NDA-gated deal rooms.</div>
    </div>
    <div class="url">edenmarket.com</div>
  </div>
</body>
</html>
