<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenMarket — For sellers (TTOs and pharma)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edenmarket.css">
  <style>
    .content { padding-top: 16vh; gap: 2.4vh; }
    .headline { font-size: 7.6vmin; max-width: 90%; }
    @media (orientation: portrait) { .headline { font-size: 9vmin; } }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-label="EdenMarket"><path d="M11 20A7 7 0 0 1 4 13c0-7 9-9 17-9 0 8-2 17-9 17a7 7 0 0 1-7-7"/><path d="M4 21c0-4 5-9 9-10"/></svg>
      <div class="wordmark"><span class="eden">Eden</span>Market</div>
    </div>
    <div class="content">
      <div class="eyebrow">For TTOs and pharma out-licensing</div>
      <div class="headline">List <span class="green">deprioritized programs</span> in front of qualified buyers.</div>
      <div class="duo">
        <div class="card">
          <div class="tag">Confidential</div>
          <div class="name">Blind listings</div>
          <div class="what">Reveal asset details only after NDA signature.</div>
        </div>
        <div class="card">
          <div class="tag">Aligned</div>
          <div class="name">Success-fee pricing</div>
          <div class="what">No upfront cost. You pay when a deal closes.</div>
        </div>
      </div>
    </div>
    <div class="url">edenmarket.com</div>
  </div>
</body>
</html>
