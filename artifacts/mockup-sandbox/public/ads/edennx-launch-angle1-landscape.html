<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenNX — Powering modern biotech (positioning, hero treatment)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edennx.css">
  <style>
    /* Hero treatment: massive EdenNX-style display headline, mirrors the
       edennx.com homepage hero. */
    .hero-headline {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 18vmin;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #0f172a;
    }
    .hero-headline .eden { color: #005f46; }
    .content { padding-top: 16vh; gap: 4vh; }
    @media (orientation: portrait) { .hero-headline { font-size: 20vmin; } }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <img src="/images/edennx-logo-full.png" alt="EdenNX">
    </div>
    <div class="content">
      <div class="eyebrow">The intelligence layer for biotech</div>
      <div class="hero-headline"><span class="eden">Eden</span>NX</div>
      <div class="subline">The intelligence backbone of modern biotech, from earliest research hypothesis through commercial licensing.</div>
    </div>
    <div class="url">edennx.com</div>
  </div>
</body>
</html>
