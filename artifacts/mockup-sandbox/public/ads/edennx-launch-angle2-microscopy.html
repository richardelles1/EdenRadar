<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EdenNX — Where the science meets the deal (positioning)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ads/_shared-edennx.css">
  <style>
    /* Narrative positioning: bold display headline with a thick green
       underline accent, calm light canvas, no AI imagery. */
    .accent-bar {
      height: 0.9vh;
      width: 9vw;
      background: #005f46;
      border-radius: 0.4vh;
      margin-bottom: 1vh;
    }
    .content { padding-top: 20vh; gap: 2.4vh; }
    .headline { font-size: 9vmin; }
    @media (orientation: portrait) {
      .headline { font-size: 10vmin; }
      .accent-bar { width: 14vw; }
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="grid-bg"></div>
    <div class="bottom-fade"></div>
    <div class="logo">
      <img src="/images/edennx-logo-full.png" alt="EdenNX">
    </div>
    <div class="content">
      <div class="eyebrow">Built for biotech</div>
      <div class="accent-bar"></div>
      <div class="headline">Where the <span class="green">science</span> meets the <span class="green">deal.</span></div>
      <div class="subline">The intelligence layer for the people moving biotech forward, from research hypothesis to commercial licensing.</div>
    </div>
    <div class="url">edennx.com</div>
  </div>
</body>
</html>
